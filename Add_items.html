<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add-Items page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #656c65;
        }


        header {
            background-color: white;
            
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: green;
        }

        nav ul {
            display: flex;
            align-items: center;
            gap: 25px;
            list-style: none;
           
        }

        nav ul a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            font-weight: 500;
        }

        nav ul a:hover {
            color: green;
            font-size: 20px;
        }

        nav button {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
        }

       
        main {
            width: 90%;
            max-width: 80%;
            margin: 30px auto;
        }

        
        article {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
        }

        article h1 {
            margin-bottom: 10px;
        }

        article h3 {
            margin-bottom: 30px;
            color: #666;
            font-size: 16px;
            font-weight: normal;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 60%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        textarea {
            resize: none;
        }

        button[type="submit"] {
            width: 150px;
            padding: 12px;
            margin-top: 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: darkgreen;
        }

        input[type="file"] {
            width: 300px;
            height: 250px;
            border: 2px dashed #ccc;
            margin-top: 15px;
            padding: 20px;
            border-radius: 10px;
            background-color: #fafafa;
        }

        
        /* aside {
            margin-top: 20px;
            padding: 15px;
            background: #fff;
            border-left: 4px solid green;
        } */

  
        footer {
            text-align: center;
            padding: 10px;
            margin-top: 30px;
            background: hwb(0 100% 0%);
            border-top: 1px solid #ddd;
        }
    </style>
</head>

<body>

  
    <header>
        <nav>
            <div class="logo">UsedMarket</div>

            <ul>
                <li><a href="Home.html">Home</a></li>
                <li><a href="Browse_items.html">Browse Items</a></li>
                <li><a href="Add_items.html">Add Items</a></li>
                <li><a href="About_us.html">About Us</a></li>
                <li><button>Search</button></li>
            </ul>
        </nav>
    </header>

   
    <main>

        <article>
            <h1>Add Your Item</h1>
            <h3>Fill the details below to add your items</h3>

            <form>

                <label>Item Title</label>
                <input type="text" placeholder="Enter item name..." required>

                <label>Category</label>
                <select>
                    <option>Select Category</option>
                    <option>Clothe</option>
                    <option>Bag</option>
                    <option>Shoes</option>
                    <option>Books</option>
                    <option>Electronics</option>
                </select>

                <label>Price (Rs)</label>
                <input type="number" placeholder="Enter price..." required>

                <label>Description</label>
                <textarea rows="3" placeholder="Describe your item..."></textarea>

                <label>Item Image</label>
                <input type="file" required>

                <button type="submit">Post Item</button>

            </form>
        </article>

        <aside>
            <!-- <p>Tip: Upload clear images to attract more buyers.</p> -->
        </aside>

    </main>

   
    <footer>
       
    </footer>

</body>

</html>

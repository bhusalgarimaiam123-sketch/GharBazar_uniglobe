
<!DOCTYPE html>
<html>
<head>
<title>GharBazar</title>
<style>

body{
    background-color:#f2f2f2;
}

.navbar{
    background:white;
    height:80px;
}

.logo{
    float:left;
    margin-left:20px;
}

.menu{
    float:left;
    margin-top:30px;
    margin-left:100px;
}

.menu a{
    text-decoration:none;
    color:black;
    margin:20px;
}

.search{
    float:right;
    margin-top:20px;
    margin-right:20px;
}

.search input{
    height:30px;
    width:200px;
}

.search button{
    height:35px;
    background:green;
    color:white;
}

.left{
    width:25%;
    height:300px;
    background:#e6e6e6;
    float:left;
    margin-top:20px;
    padding:20px;
}

.right{
    width:68%;
    float:right;
    margin-top:20px;
}

.right img{
    width:75%;
    height:400px;
}

.btn1{
    background:#00ff66;
    border:none;
    padding:10px;
}

.btn2{
    background:lightgray;
    border:none;
    padding:10px;
}

.categories{
    clear:both;
    margin-top:400px;
}

.box{
    width:180px;
    height:180px;
    background:white;
    float:left;
    margin:10px;
    text-align:center;
}

.box img{
    width:120px;
    height:100px;
}

</style>

</head>

<body>

<div class="navbar">

    <div class="logo">
        <img src="logo.png" width="70">
    </div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Buy and Sell</a>
        <a href="#">Add Items</a>
        <a href="#">About Us</a>
    </div>

    <div class="search">
        <input type="text" placeholder="Search items">
        <button>Search</button>
    </div>

</div>

<div class="left">

    <h1>Buy and Sell</h1>

    <h2 style="color:rgb(135, 220, 92);">Used Goods</h2>

    <p>Find something great in your neighborhood.</p>

    <br><br>

    <button class="btn1">Browse Items</button>

    <button class="btn2">Add Your Item</button>

</div>

<div class="right">

    <img src="banner.png">

</div>

<div class="categories">

    <h1>Popular Categories</h1>

    <div class="box">
        <img src="Electronic.jpeg">
        <h3>Electronics</h3>
    </div>

    <div class="box">
        <img src="Furniture.jpeg">
        <h3>Furniture</h3>
    </div>

    <div class="box">
        <img src="books.jpeg">
        <h3>Books</h3>
    </div>

    <div class="box">
        <img src="clothes.jpeg">
        <h3>Clothes</h3>
    </div>

    <div class="box">
        <img src="Other items.jpeg">
        <h3>Others</h3>
    </div>

</div>

</body>
</html>
